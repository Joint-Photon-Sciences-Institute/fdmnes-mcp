name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Build + import smoke test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Import + --info smoke test
        run: |
          python -c "import fdmnes_mcp, fdmnes_mcp.server, fdmnes_mcp.tools.io_tools; print('OK')"
          python -m fdmnes_mcp --version
          # --info exits non-zero when FDMNES isn't installed; that's fine on CI
          python -m fdmnes_mcp --info || true

      - name: Build wheel + sdist
        run: |
          pip install build
          python -m build
          ls -lh dist/
